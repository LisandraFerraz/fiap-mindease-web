<div class="card">
  <div class="title">
    <span class="icon-container">
      <mat-icon [fontIcon]="icon" [class]="`${notifData.alertType}`" />
    </span>
    <div class="top">
      <p>{{ notifData.title }}</p>
      <button (click)="handleGoToRoute()">
        <mat-icon fontIcon="arrow_forward_ios" />
      </button>
    </div>
  </div>

  <p class="description">{{ notifData.description }}</p>

  <div class="bottom">
    <button (click)="handleClick()">Marcar como lido</button>
  </div>
</div>
