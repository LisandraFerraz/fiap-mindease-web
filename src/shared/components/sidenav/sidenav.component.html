<div class="container">
  <div class="sidenav-wrapper">
    <div [class]="['btn-nav', isSidenavOpened() ? 'btn-close' : 'btn-open']">
      <button (click)="setNavVisible()">
        <mat-icon [class.openMenu]="isSidenavOpened()" fontIcon="menu_open'" />
      </button>
    </div>
    @if (isSidenavOpened()) {
      <div class="sidenav">
        <div class="top">
          <em class="icone"></em>
        </div>
        <div class="items">
          <div class="main">
            <ul>
              @for (item of navItems; track item.name) {
                <li [class.active-route]="item.isActive">
                  <a [href]="item.route">
                    <mat-icon [fontIcon]="item.icon" />
                    {{ item.name }}</a
                  >
                </li>
              }
            </ul>
          </div>
          <span class="divisor"></span>
          <div class="bottom items">
            <span>
              <a href="preferencias">
                <mat-icon fontIcon="settings" />
                Preferências</a
              >
            </span>
            <span (click)="logout()">
              <mat-icon fontIcon="logout" />
              Logout
            </span>
          </div>
        </div>
      </div>
    }
  </div>

  <div [class]="[isSidenavOpened() ? 'content' : 'content-focused']" style="width: 100%">
    <ngx-loading-bar height="5px" color="#2f64c7" />
    <ng-content />
  </div>
</div>
