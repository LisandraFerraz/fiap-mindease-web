<div class="card">
  <div class="card-col">
    <span [class]="[data.priority, 'tag']">{{ getPriority() }}</span>
    <p class="card-title">{{ data.title }}</p>
  </div>
  <div class="card-col">
    <p class="card-count">
      {{ data.dayCountMessage }}
    </p>
    <button (click)="goToKanban()">
      <mat-icon fontIcon="arrow_right_alt" />
    </button>
  </div>
</div>
