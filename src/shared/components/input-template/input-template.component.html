<div>
  @if (label) {
    <div class="label">
      <label [for]="inputId">{{ label }} </label>
      @if (required) {
        <span class="required">(obrigatório)</span>
      }
      @if (errorMsg) {
        <span class="error-msg">
          {{ errorMsg }}
        </span>
      }
    </div>
  }
  <ng-content />
</div>
