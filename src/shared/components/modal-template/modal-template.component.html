<div class="container">
  <div class="top">
    <button (click)="close()" class="close-btn">
      <mat-icon fontIcon="close" />
    </button>
  </div>
  <ng-content />

  <div class="bottom">
    @if (showBottom) {
      <me-button
        label="Confirmar"
        customClass="interactive_button"
        color="primary"
        [disabled]="disabled"
        (click)="onConfirm()"
      />
    }
  </div>
</div>
