<input-template [label]="label" [required]="required" [inputId]="inputId" [errorMsg]="errorMsg">
  <input
    (input)="handleChange($event)"
    [value]="value"
    [id]="inputId"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [class]="[class, errorMsg ? 'error-input' : '']"
    [attr.maxlength]="maxLen"
  />
</input-template>
