<div>
  @if (label) {
    <div class="label">
      <label [for]="inputId">{{ label }}</label>
      @if (errorMsg) {
        <span class="error-msg">
          {{ errorMsg }}
        </span>
      }
    </div>
  }
  <input
    (input)="handleChange($event)"
    [value]="value"
    [id]="inputId"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [class]="[class, errorMsg ? 'error-input' : '']"
  />
</div>
