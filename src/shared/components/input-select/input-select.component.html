<input-template [label]="label" [required]="required" [inputId]="inputId" [errorMsg]="errorMsg">
  <div class="selector">
    <select [(ngModel)]="value" (change)="handleChange($event)" name="priority" id="priority">
      @for (item of options; track item) {
        <option [value]="item">{{ getKeyValue(item) }}</option>
      }
    </select>
  </div>
</input-template>
